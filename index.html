<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全民運動科公文小助手</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="decor decor-star star-1">✦</div>
    <div class="decor decor-star star-2">✧</div>
    <div class="decor decor-heart heart-1">♡</div>
    <div class="decor decor-bubble bubble-1"></div>
    <div class="decor decor-bubble bubble-2"></div>
    <div class="decor decor-bubble bubble-3"></div>

    <header class="hero">
      <div class="cloud cloud-left"></div>
      <div class="cloud cloud-right"></div>
      <div class="hero-panel">
        <section class="hero-text">
          <span class="eyebrow">☁️ Kaohsiung Document Helper</span>
          <h1>全民運動科<br />公文小助手</h1>
          <p>先給你「小助手整理步驟」，再保留「手冊原文依據」可以查核。依身分查詢，不跨手冊混用。</p>
          <div class="hero-pills">
            <a href="#searchPanel" class="start-pill">開始查詢</a>
            <span class="info-pill">PDF 原文保留</span>
            <span class="info-pill">12 份手冊</span>
          </div>
        </section>

        <section class="mascot-stage" aria-label="雲朵長耳小助手裝飾">
          <div class="moon"></div>
          <div class="tiny-card card-a">簽收</div>
          <div class="tiny-card card-b">核判</div>
          <div class="tiny-card card-c">歸檔</div>
          <div class="cloud-dog">
            <div class="dog-ear dog-ear-left"></div>
            <div class="dog-ear dog-ear-right"></div>
            <div class="dog-face">
              <div class="dog-eye dog-eye-left"></div>
              <div class="dog-eye dog-eye-right"></div>
              <div class="dog-cheek dog-cheek-left"></div>
              <div class="dog-cheek dog-cheek-right"></div>
              <div class="dog-nose"></div>
              <div class="dog-mouth"></div>
            </div>
            <div class="dog-curl-tail"></div>
            <div class="dog-beret">✦</div>
          </div>
          <div class="cloud-base"></div>
        </section>
      </div>
    </header>

    <main class="container">
      <section class="notice-card">
        <div class="notice-icon">🪽</div>
        <div>
          <h2>使用方式</h2>
          <p>請先選擇身分，再輸入關鍵字。結果會優先顯示「精選操作指引」，也會搜尋完整 PDF 抽取原文頁面。</p>
        </div>
      </section>

      <section id="searchPanel" class="search-panel">
        <div class="panel-title">
          <span class="title-icon">☁</span>
          <div>
            <h2>查詢公文操作</h2>
            <p>輸入情境、功能名稱、按鈕名稱都可以。</p>
          </div>
        </div>

        <div class="form-grid">
          <label class="field">
            <span>選擇身分</span>
            <select id="roleSelect">
              <option value="">請選擇身分</option>
            </select>
          </label>

          <label class="field">
            <span>查詢關鍵字</span>
            <input id="queryInput" type="text" placeholder="例：紙本來文存查、補簽、設定代理、點收作業" autocomplete="off" />
          </label>
        </div>

        <div class="button-row">
          <button id="searchBtn" class="btn btn-primary">查詢指引</button>
          <button id="clearBtn" class="btn btn-secondary">清除內容</button>
        </div>

        <div class="quick-searches" id="quickSearches"></div>
      </section>

      <section class="status-panel">
        <div id="dataStatus">資料載入中……</div>
      </section>

      <section class="results-panel">
        <div class="results-heading">
          <div>
            <h2>查詢結果</h2>
            <p>先看整理步驟，需要查核再展開原文。</p>
          </div>
          <div id="resultCount" class="result-count"></div>
        </div>
        <div id="results" class="results-list"></div>
      </section>
    </main>

    <footer class="footer">全民運動科公文小助手｜小助手整理步驟 + 手冊原文依據</footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
