<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全民運動科公文小助手</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 裝飾 -->
<div class="deco-cloud cloud-1" aria-hidden="true"></div>
<div class="deco-cloud cloud-2" aria-hidden="true"></div>
<div class="deco-cloud cloud-3" aria-hidden="true"></div>
<div class="deco-star star-1" aria-hidden="true">✦</div>
<div class="deco-star star-2" aria-hidden="true">✧</div>
<div class="deco-star star-3" aria-hidden="true">✦</div>
<div class="deco-star star-4" aria-hidden="true">✧</div>

<header class="site-header">
  <div class="header-inner">
    <div class="header-mascot" aria-hidden="true">
      <img src="mascot.png" alt="公文小助手吉祥物" class="mascot-img">
    </div>
    <div class="header-text">
      <h1 class="header-title">全民運動科公文小助手</h1>
      <p class="header-subtitle">快速查詢各身分對應操作手冊原文，協助找到清楚明瞭的公文處理指引。</p>
    </div>
  </div>
</header>

<main class="main-content">

  <!-- 歡迎說明 -->
  <section class="welcome-card">
    <div class="welcome-icon" aria-hidden="true">🌸</div>
    <div class="welcome-text">
      <p class="welcome-title">歡迎使用全民運動科公文小助手！</p>
      <p class="welcome-desc">請先選擇您的身分，再輸入想查詢的關鍵字，系統會從對應手冊中找出原文內容，提供您最直接的操作指引。</p>
    </div>
  </section>

  <!-- 載入提示（資料未就緒時顯示） -->
  <div id="dataLoadingBar" class="data-loading-bar" style="display:none">
    <div class="data-loading-inner">
      <div class="loading-spinner-sm"></div>
      <span id="dataLoadingText">正在載入手冊資料，請稍候…</span>
    </div>
  </div>
  <div id="dataErrorBar" class="data-error-bar" style="display:none">
    ⚠ 無法載入手冊資料（search-data.json），請確認檔案存在後重新整理頁面。
  </div>

  <!-- 查詢面板 -->
  <section class="search-panel">
    <div class="panel-header">
      <span class="panel-icon" aria-hidden="true">🔍</span>
      <h2 class="panel-title">查詢操作指引</h2>
      <div class="panel-ribbon" aria-hidden="true"></div>
    </div>

    <form id="searchForm" class="search-form" autocomplete="off">

      <div class="form-row">
        <label class="form-label" for="roleSelect">
          <span class="label-icon" aria-hidden="true">👤</span>
          <span class="label-text">使用者身分</span>
          <span class="label-required" aria-hidden="true">必填</span>
        </label>
        <div class="select-wrapper">
          <select id="roleSelect" name="role" class="form-select" required>
            <option value="">── 請選擇您的身分 ──</option>
            <option value="承辦人">承辦人</option>
            <option value="基層主管">基層主管</option>
            <option value="核判長官">核判長官</option>
            <option value="登記桌人員">登記桌人員</option>
            <option value="機關收文人員">機關收文人員</option>
            <option value="機關發文人員">機關發文人員</option>
            <option value="研考人員">研考人員</option>
            <option value="機關系統管理者">機關系統管理者</option>
            <option value="電子交換人員">電子交換人員</option>
            <option value="影像掃描人員">影像掃描人員</option>
            <option value="檔案管理人員（學校）">檔案管理人員（學校）</option>
            <option value="檔案管理人員（機關）">檔案管理人員（機關）</option>
          </select>
          <span class="select-arrow" aria-hidden="true">▾</span>
        </div>
        <div id="roleStatus" class="role-status" role="status" aria-live="polite"></div>
      </div>

      <div class="form-row">
        <label class="form-label" for="queryInput">
          <span class="label-icon" aria-hidden="true">✏️</span>
          <span class="label-text">查詢關鍵字</span>
          <span class="label-required" aria-hidden="true">必填</span>
          <span class="label-hint">可用空白隔開多個關鍵字</span>
        </label>
        <div class="input-group">
          <input
            type="text"
            id="queryInput"
            name="query"
            class="form-input"
            placeholder="例如：發文、簽核流程、附件上傳…"
            maxlength="100"
          >
          <button type="submit" class="btn-search" id="searchBtn">
            🔍 查詢指引
          </button>
          <button type="button" class="btn-clear" onclick="clearAll()">
            ✕ 清除內容
          </button>
        </div>
      </div>

    </form>
  </section>

  <!-- 查詢結果 -->
  <section class="results-section" id="resultsSection" style="display:none" aria-live="polite">
    <div class="results-header">
      <span class="results-icon" aria-hidden="true">📋</span>
      <span class="results-label">查詢結果</span>
      <span id="resultsBadge" class="results-badge"></span>
      <span id="resultsInfo" class="results-info"></span>
    </div>
    <div id="resultsList" class="results-list"></div>
  </section>

  <!-- 無結果 -->
  <section class="no-result-section" id="noResultSection" style="display:none" aria-live="polite">
    <div class="no-result-box">
      <div class="no-result-deco" aria-hidden="true">
        <span class="no-result-cloud">☁️</span>
        <span class="no-result-stars">✦ ✧ ✦</span>
      </div>
      <p class="no-result-text">查無對應原文指引，請改用其他關鍵字查詢。</p>
      <p class="no-result-hint">試試看不同的詞彙，例如功能名稱或操作步驟關鍵詞 ☁️</p>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="footer-deco" aria-hidden="true">✦ ☁ ✧ ☁ ✦</div>
  <p>全民運動科公文小助手｜提供各身分操作手冊原文查詢</p>
</footer>

<script src="app.js"></script>
</body>
</html>
